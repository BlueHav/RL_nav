policy_class: MultiInputPolicy
policy:
  feature_extractor_class: StateTargetGeodesicSpatialExtractor
  feature_extractor_kwargs:
    activation_fn: leaky_relu
    net_arch:
      state:
        mlp_layer: [32]
        bn: False
        ln: True
      target:
        mlp_layer: [32]
        bn: False
        ln: True
      geodesic:
        mlp_layer: [32]
        bn: False
        ln: True
      output_hw: [3, 5]
      depth_out_channels: 128
      fusion_channels: 192
  net_arch:
    enable_geodesic_aux: True
    geo_aux_head_hidden: 64
    recurrent:
      class: LayerNormGRUCell
      kwargs:
        hidden_size: 192
    mlp_layer: [3]
  activation_fn: leaky_relu
  output_activation_fn: identity
  device: cuda

update_env_kwargs:
  action_type: THRUST_TARGET_YAW
  inertial_frame: START
  target_type: TARGET_VELOCITY_TARGET_DISTANCE
